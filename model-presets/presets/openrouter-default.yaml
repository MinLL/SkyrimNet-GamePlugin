# Default preset — mirrors the in-code TextModelConfig defaults.
# Mod-registered variants inherit base by default (intentionally not
# listed here so they fall through to the base rotation).
providers:
  active_provider_id: openrouter

openrouter:
  model_name: deepseek/deepseek-v3.2
  model_params:
    - { name: deepseek/deepseek-v3.2, provider_id: openrouter, temperature: 0.7 }

  default_params:
    temperature: 0.7
    max_tokens: 4096
    top_p: 1
    top_k: 5
    frequency_penalty: 0
    presence_penalty: 0

  variants:
    AgentDefault:
      model_name: anthropic/claude-haiku-4.5
      timeout: 120
      model_params:
        - { name: anthropic/claude-haiku-4.5, provider_id: openrouter, temperature: 0.7 }
      default_params: { temperature: 0.7, max_tokens: 32000 }

    CharacterProfileGeneration:
      model_name: qwen/qwen3-235b-a22b-2507
      timeout: 300
      model_params:
        - { name: qwen/qwen3-235b-a22b-2507, provider_id: openrouter, temperature: 0.7 }
      default_params: { temperature: 0.7, max_tokens: 10000 }

    DiaryGeneration:
      model_name: qwen/qwen3-235b-a22b-2507
      timeout: 120
      model_params:
        - { name: qwen/qwen3-235b-a22b-2507, provider_id: openrouter, temperature: 0.8 }
      default_params: { temperature: 0.8, max_tokens: 12000 }

    UniversalTranslator:
      model_name: google/gemini-2.5-flash
      model_params:
        - { name: google/gemini-2.5-flash, provider_id: openrouter, temperature: 0.7 }
      default_params: { temperature: 0.7, max_tokens: 512 }

    combat:
      model_name: x-ai/grok-4-fast
      model_params:
        - { name: x-ai/grok-4-fast, provider_id: openrouter, temperature: 0.8 }
      default_params: { temperature: 0.8, max_tokens: 2000 }

    action_evaluation:
      model_name: deepseek/deepseek-chat-v3-0324
      model_params:
        - { name: deepseek/deepseek-chat-v3-0324, provider_id: openrouter, temperature: 0.7 }
      default_params: { temperature: 0.7, max_tokens: 500 }

    gamemaster_evaluation:
      model_name: meta-llama/llama-3.3-70b-instruct
      timeout: 30
      model_params:
        - { name: meta-llama/llama-3.3-70b-instruct, provider_id: openrouter, temperature: 0.8 }
      default_params: { temperature: 0.8, max_tokens: 256 }

    memory:
      model_name: qwen/qwen3-235b-a22b-2507
      timeout: 60
      model_params:
        - { name: qwen/qwen3-235b-a22b-2507, provider_id: openrouter, temperature: 0.7 }
      default_params: { temperature: 0.7, max_tokens: 4000 }

    meta:
      model_name: x-ai/grok-4-fast
      model_params:
        - { name: x-ai/grok-4-fast, provider_id: openrouter, temperature: 0.7 }
      default_params: { temperature: 0.7, max_tokens: 100 }

    vision:
      model_name: qwen/qwen3-vl-8b-instruct
      model_params:
        - { name: qwen/qwen3-vl-8b-instruct, provider_id: openrouter, temperature: 0.7 }
      default_params: { temperature: 0.7, max_tokens: 4000 }
